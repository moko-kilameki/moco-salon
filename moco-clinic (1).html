<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ぬいぐるみサロン モコ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Zen+Maru+Gothic:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Zen Maru Gothic', 'Noto Serif JP', serif;
      background: #FEFEFE;
      color: #4A4A4A;
      line-height: 1.8;
      font-weight: 300;
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 80px 40px;
    }

    .container-wide {
      max-width: 1400px;
      margin: 0 auto;
      padding: 60px 40px;
    }

    .hidden {
      display: none !important;
    }

    /* Welcome Page */
    .welcome {
      text-align: center;
      padding-top: 100px;
    }

    .welcome-title {
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      margin-bottom: 80px;
      opacity: 0.9;
    }

    .welcome-title::before {
      content: '';
      display: block;
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, rgba(74, 74, 74, 0.2), transparent);
      margin: 0 auto 60px;
    }

    .welcome-message {
      font-size: 0.95rem;
      line-height: 2.2;
      margin-bottom: 80px;
      opacity: 0.7;
    }

    .nav-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Buttons */
    .button {
      background: transparent;
      border: 1px solid rgba(74, 74, 74, 0.2);
      padding: 16px 40px;
      font-size: 0.9rem;
      font-family: 'Zen Maru Gothic', serif;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 300;
      color: #4A4A4A;
    }

    .button:hover {
      background: rgba(74, 74, 74, 0.03);
      border-color: rgba(74, 74, 74, 0.3);
    }

    .button-primary {
      border-color: rgba(74, 74, 74, 0.3);
    }

    .button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .button-small {
      padding: 10px 24px;
      font-size: 0.85rem;
    }

    /* Form */
    .title {
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      margin-bottom: 60px;
      text-align: center;
      opacity: 0.8;
    }

    .form-group {
      margin-bottom: 60px;
    }

    .label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 16px;
      letter-spacing: 0.08em;
      opacity: 0.7;
    }

    .input,
    .textarea {
      width: 100%;
      padding: 16px 20px;
      border: 1px solid rgba(74, 74, 74, 0.15);
      background: #FEFEFE;
      font-size: 0.95rem;
      font-family: 'Zen Maru Gothic', serif;
      line-height: 1.8;
      transition: border-color 0.3s ease;
      font-weight: 300;
    }

    .input:focus,
    .textarea:focus {
      outline: none;
      border-color: rgba(74, 74, 74, 0.3);
    }

    .textarea {
      min-height: 120px;
      resize: vertical;
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-size: 0.9rem;
      opacity: 0.7;
      transition: opacity 0.3s ease;
    }

    .checkbox-label:hover {
      opacity: 1;
    }

    .checkbox {
      margin-right: 12px;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* Carte */
    .carte-header {
      text-align: center;
      margin-bottom: 60px;
      padding-bottom: 40px;
      border-bottom: 1px solid rgba(74, 74, 74, 0.1);
    }

    .carte-nui-name {
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      margin-bottom: 20px;
    }

    .carte-moco {
      font-size: 0.85rem;
      opacity: 0.5;
      letter-spacing: 0.1em;
    }

    .carte-body {
      white-space: pre-line;
      line-height: 2.4;
      font-size: 0.95rem;
      margin-bottom: 80px;
      opacity: 0.8;
    }

    .moco-info {
      background: rgba(245, 245, 220, 0.15);
      padding: 40px;
      margin-bottom: 60px;
      border-left: 3px solid;
    }

    .moco-name {
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }

    .moco-phrase {
      font-size: 0.9rem;
      line-height: 2;
      opacity: 0.7;
    }

    .prescription-card {
      width: 91mm;
      height: 55mm;
      background: #FEFEFE;
      border: 1px solid rgba(74, 74, 74, 0.1);
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      margin: 40px auto;
    }

    .prescription-card-phrase {
      font-size: 0.95rem;
      line-height: 2;
      letter-spacing: 0.05em;
      opacity: 0.8;
    }

    .prescription-section {
      margin-top: 80px;
    }

    .prescription-intro {
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 60px;
      opacity: 0.6;
      line-height: 2;
    }

    .prescription-list {
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .prescription-item {
      padding: 40px;
      border: 1px solid rgba(74, 74, 74, 0.1);
    }

    .prescription-name {
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }

    .prescription-category {
      font-size: 0.85rem;
      opacity: 0.5;
      margin-bottom: 24px;
    }

    .prescription-message {
      font-size: 0.9rem;
      line-height: 2;
      opacity: 0.7;
      white-space: pre-line;
    }

    /* Admin */
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 60px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(74, 74, 74, 0.1);
      flex-wrap: wrap;
      gap: 20px;
    }

    .admin-title {
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.15em;
    }

    .filter-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .filter-button {
      padding: 8px 20px;
      font-size: 0.85rem;
      border: 1px solid rgba(74, 74, 74, 0.2);
      background: transparent;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Zen Maru Gothic', serif;
      letter-spacing: 0.08em;
      font-weight: 300;
    }

    .filter-button.active {
      background: rgba(74, 74, 74, 0.05);
      border-color: rgba(74, 74, 74, 0.3);
    }

    .carte-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: rgba(74, 74, 74, 0.1);
    }

    .carte-list-item {
      background: #FEFEFE;
      padding: 24px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .carte-list-item:hover {
      background: rgba(74, 74, 74, 0.02);
    }

    .carte-list-info {
      display: flex;
      gap: 30px;
      align-items: center;
      flex-wrap: wrap;
    }

    .carte-list-time {
      font-size: 0.85rem;
      opacity: 0.5;
      min-width: 60px;
    }

    .carte-list-id {
      font-size: 0.9rem;
      opacity: 0.7;
      min-width: 120px;
    }

    .carte-list-status {
      font-size: 0.85rem;
      padding: 4px 12px;
      border-radius: 2px;
      min-width: 70px;
      text-align: center;
    }

    .status-pending {
      background: rgba(255, 215, 0, 0.1);
      color: #B8860B;
    }

    .status-editing {
      background: rgba(173, 216, 230, 0.15);
      color: #5F9EA0;
    }

    .status-confirmed {
      background: rgba(144, 238, 144, 0.15);
      color: #2F4F2F;
    }

    .carte-list-length {
      font-size: 0.85rem;
      opacity: 0.4;
    }

    /* Edit */
    .edit-container {
      display: grid;
      grid-template-columns: 300px 1fr 280px;
      gap: 40px;
      align-items: start;
    }

    @media (max-width: 1200px) {
      .edit-container {
        grid-template-columns: 1fr;
      }
    }

    .edit-panel {
      padding: 30px;
      border: 1px solid rgba(74, 74, 74, 0.1);
    }

    .edit-panel-title {
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
      opacity: 0.7;
    }

    .edit-main {
      padding: 40px;
      border: 1px solid rgba(74, 74, 74, 0.1);
      background: #FEFEFE;
    }

    .edit-block {
      margin-bottom: 40px;
    }

    .edit-block-label {
      font-size: 0.85rem;
      opacity: 0.5;
      margin-bottom: 12px;
      letter-spacing: 0.08em;
    }

    .edit-textarea {
      width: 100%;
      min-height: 100px;
      padding: 16px;
      border: 1px solid rgba(74, 74, 74, 0.15);
      background: #FEFEFE;
      font-size: 0.9rem;
      font-family: 'Zen Maru Gothic', serif;
      line-height: 2;
      resize: vertical;
      font-weight: 300;
    }

    .edit-textarea:focus {
      outline: none;
      border-color: rgba(74, 74, 74, 0.3);
    }

    .phrase-selector {
      margin-bottom: 16px;
    }

    .phrase-option {
      padding: 16px 20px;
      border: 1px solid rgba(74, 74, 74, 0.1);
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.9rem;
      line-height: 2;
      background: #FEFEFE;
    }

    .phrase-option:hover {
      background: rgba(74, 74, 74, 0.02);
      border-color: rgba(74, 74, 74, 0.2);
    }

    .phrase-option.selected {
      background: rgba(74, 74, 74, 0.03);
      border-color: rgba(74, 74, 74, 0.3);
    }

    .phrase-option.custom {
      border-style: dashed;
      opacity: 0.6;
      font-style: italic;
    }

    .edit-mode-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .mode-button {
      padding: 8px 16px;
      font-size: 0.8rem;
      border: 1px solid rgba(74, 74, 74, 0.15);
      background: transparent;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Zen Maru Gothic', serif;
      letter-spacing: 0.05em;
      font-weight: 300;
    }

    .mode-button.active {
      background: rgba(74, 74, 74, 0.05);
      border-color: rgba(74, 74, 74, 0.3);
    }

    .custom-input-area {
      margin-top: 8px;
    }

    /* ========================================
       確定前チェック
       ======================================== */
    
    .confirmation-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(254, 254, 254, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 40px;
    }

    .confirmation-content {
      max-width: 600px;
      width: 100%;
      background: #FEFEFE;
      border: 1px solid rgba(74, 74, 74, 0.2);
      padding: 60px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .confirmation-title {
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      margin-bottom: 50px;
      text-align: center;
      opacity: 0.8;
    }

    .confirmation-checklist {
      margin-bottom: 50px;
    }

    .confirmation-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 30px;
      padding: 20px;
      border: 1px solid rgba(74, 74, 74, 0.1);
      transition: all 0.3s ease;
    }

    .confirmation-item.checked {
      background: rgba(144, 238, 144, 0.05);
      border-color: rgba(144, 238, 144, 0.3);
    }

    .confirmation-item.warning {
      background: rgba(255, 215, 0, 0.05);
      border-color: rgba(255, 215, 0, 0.3);
    }

    .confirmation-checkbox {
      width: 20px;
      height: 20px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .confirmation-label {
      font-size: 0.9rem;
      line-height: 1.8;
      flex-grow: 1;
    }

    .confirmation-detail {
      font-size: 0.8rem;
      opacity: 0.6;
      margin-top: 8px;
      line-height: 1.6;
    }

    .confirmation-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .confirmation-warning {
      text-align: center;
      font-size: 0.85rem;
      color: #B8860B;
      margin-bottom: 30px;
      line-height: 1.8;
      opacity: 0.8;
    }

    .confirmation-preview {
      margin-bottom: 40px;
      padding: 30px;
      border: 1px solid rgba(74, 74, 74, 0.1);
      background: rgba(245, 245, 220, 0.05);
    }

    .confirmation-preview-title {
      font-size: 0.85rem;
      opacity: 0.5;
      margin-bottom: 16px;
      letter-spacing: 0.08em;
    }

    .confirmation-preview-text {
      font-size: 0.9rem;
      line-height: 2.2;
      opacity: 0.7;
      white-space: pre-line;
      max-height: 300px;
      overflow-y: auto;
    }

    .edit-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .moco-option {
      padding: 16px;
      border: 1px solid rgba(74, 74, 74, 0.1);
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .moco-option:hover {
      background: rgba(74, 74, 74, 0.02);
      border-color: rgba(74, 74, 74, 0.2);
    }

    .moco-option.selected {
      background: rgba(74, 74, 74, 0.03);
      border-color: rgba(74, 74, 74, 0.3);
    }

    .moco-ear {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .moco-option-name {
      font-size: 0.85rem;
      flex-grow: 1;
    }

    .prescription-checkboxes {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .prescription-checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.3s ease;
    }

    .prescription-checkbox-label:hover {
      opacity: 1;
    }

    .prescription-checkbox {
      width: 16px;
      height: 16px;
    }

    .questionnaire-display {
      font-size: 0.85rem;
      line-height: 2;
      opacity: 0.6;
    }

    .questionnaire-field {
      margin-bottom: 16px;
    }

    .questionnaire-label {
      font-weight: 400;
      opacity: 0.8;
      margin-bottom: 4px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.8s ease-out;
    }

    .text-center {
      text-align: center;
    }

    .empty-state {
      text-align: center;
      padding: 100px 0;
      opacity: 0.4;
    }

    .action-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 80px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div id="app"></div>

    // ========================================
    // ロジック関数
    // ========================================
    function selectMoco(questionnaire) {
      const allText = `${questionnaire.recentCondition} ${questionnaire.concerns} ${questionnaire.fatigueType.join(' ')} ${questionnaire.role}`.toLowerCase();
      
      const scores = Object.values(MOCO_TYPES).map(moco => {
        let score = 0;
        moco.keywords.forEach(keyword => {
          if (allText.includes(keyword)) score += 1;
        });
        return { moco, score };
      });
      
      scores.sort((a, b) => b.score - a.score);
      return scores[0].score > 0 ? scores[0].moco : MOCO_TYPES.SUKIMA;
    }

    function selectPrescriptions(questionnaire) {
      const allText = `${questionnaire.recentCondition} ${questionnaire.concerns} ${questionnaire.fatigueType.join(' ')}`.toLowerCase();
      
      const scores = Object.values(PRESCRIPTIONS).map(prescription => {
        let score = 0;
        prescription.keywords.forEach(keyword => {
          if (allText.includes(keyword)) score += 1;
        });
        return { prescription, score };
      });
      
      scores.sort((a, b) => b.score - a.score);
      const selected = scores.filter(s => s.score > 0).slice(0, 3).map(s => s.prescription);
      return selected.length > 0 ? selected : [PRESCRIPTIONS.DRY_TEA];
    }

      const mocoId = selectedMoco.id;

        stateAcceptance: CARTE_PHRASES.STATE_ACCEPTANCE[0],

        supportDirection: CARTE_PHRASES.SUPPORT_DIRECTION[0]

    // ========================================
    // ストレージ関数
    // ========================================
    const STORAGE_PREFIX = 'moco_clinic_';

    async function saveCarte(carteData) {
      try {
        const id = carteData.id || `nui_${Date.now()}`;
        const key = `${STORAGE_PREFIX}carte_${id}`;
        const dataToSave = { ...carteData, id, savedAt: new Date().toISOString() };
        const result = await window.storage.set(key, JSON.stringify(dataToSave), false);
        return result ? { success: true, id } : { success: false };
      } catch (error) {
        console.error('カルテ保存エラー:', error);
        return { success: false, error: error.message };
      }
    }

    async function getCarte(id) {
      try {
        const key = `${STORAGE_PREFIX}carte_${id}`;
        const result = await window.storage.get(key, false);
        return result && result.value ? JSON.parse(result.value) : null;
      } catch (error) {
        console.error('カルテ取得エラー:', error);
        return null;
      }
    }

    async function getAllCartes() {
      try {
        const result = await window.storage.list(`${STORAGE_PREFIX}carte_`, false);
        if (!result || !result.keys) return [];
        
        const cartes = [];
        for (const key of result.keys) {
          const id = key.replace(`${STORAGE_PREFIX}carte_`, '');
          const carte = await getCarte(id);
          if (carte) cartes.push(carte);
        }
        
        cartes.sort((a, b) => new Date(b.savedAt) - new Date(a.savedAt));
        return cartes;
      } catch (error) {
        console.error('全カルテ取得エラー:', error);
        return [];
      }
    }

    async function updateCarte(id, updates) {
      try {
        const existingCarte = await getCarte(id);
        if (!existingCarte) return { success: false };
        const updatedCarte = { ...existingCarte, ...updates, updatedAt: new Date().toISOString() };
        return await saveCarte(updatedCarte);
      } catch (error) {
        console.error('カルテ更新エラー:', error);
        return { success: false };
      }
    }

                      </div>
                    </div>
                    <div class="carte-list-length">
                      ${carte.questionnaire.recentCondition?.length || 0}文字
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          `}
        </div>
      `;
    }

    function renderEdit() {
      if (!state.editingCarte) return '';

      // 編集ブロックを生成する関数
      function renderEditBlock(fieldKey, label, phrases) {
        const mode = state.editMode[fieldKey];
        const currentValue = state.editingCarte.carteText[fieldKey];
        
        return `
          <div class="edit-block">
            <div class="edit-block-label">${label}</div>
            
            <div class="edit-mode-toggle">
              <button 
                class="mode-button ${mode === 'select' ? 'active' : ''}"
                onclick="app.setEditMode('${fieldKey}', 'select')"
              >
                文言を選択
              </button>
              <button 
                class="mode-button ${mode === 'custom' ? 'active' : ''}"
                onclick="app.setEditMode('${fieldKey}', 'custom')"
              >
                自由入力
              </button>
            </div>

            ${mode === 'select' ? `
              <div class="phrase-selector">
                ${phrases.map((phrase, index) => `
                  <div 
                    class="phrase-option ${currentValue === phrase ? 'selected' : ''}"
                    onclick="app.selectPhrase('${fieldKey}', ${index})"
                  >
                    ${phrase}
                  </div>
                `).join('')}
              </div>
            ` : `
              <div class="custom-input-area">
                <textarea 
                  id="edit-${fieldKey}"
                  class="edit-textarea"
                  onchange="app.updateCustomText('${fieldKey}', this.value)"
                >${currentValue}</textarea>
              </div>
            `}
          </div>
        `;
      }

      // 存在の肯定ブロック（特別処理：モコごとの文言）
      function renderExistenceBlock() {
        const mode = state.editMode.existenceAffirmation;
        const currentValue = state.editingCarte.carteText.existenceAffirmation;
        
        // モコごとの文言を取得（配列を展開）
        const mocoId = state.editingCarte.selectedMoco.id;
        const phrases = [];
        
        Object.entries(CARTE_PHRASES.EXISTENCE_AFFIRMATION).forEach(([key, valueArray]) => {
          const mocoName = key === 'kirameki' ? 'きらめきモコ' : Object.values(MOCO_TYPES).find(m => m.id === key)?.name || key;
          valueArray.forEach((phrase, index) => {
            phrases.push({
              key,
              value: phrase,
              mocoName,
              phraseIndex: index
            });
          });
        });

        return `
          <div class="edit-block">
            <div class="edit-block-label">④ 存在の肯定（必須）</div>
            
            <div class="edit-mode-toggle">
              <button 
                class="mode-button ${mode === 'select' ? 'active' : ''}"
                onclick="app.setEditMode('existenceAffirmation', 'select')"
              >
                文言を選択
              </button>
              <button 
                class="mode-button ${mode === 'custom' ? 'active' : ''}"
                onclick="app.setEditMode('existenceAffirmation', 'custom')"
              >
                自由入力
              </button>
            </div>

            ${mode === 'select' ? `
              <div class="phrase-selector">
                ${phrases.map((item, index) => `
                  <div 
                    class="phrase-option ${currentValue === item.value ? 'selected' : ''}"
                    onclick="app.selectExistencePhrase('${item.key}', ${item.phraseIndex})"
                  >
                    ${item.value}
                    <div style="font-size: 0.75rem; opacity: 0.5; margin-top: 4px;">${item.mocoName}用</div>
                  </div>
                `).join('')}
              </div>
            ` : `
              <div class="custom-input-area">
                <textarea 
                  id="edit-existenceAffirmation"
                  class="edit-textarea"
                  style="min-height: 60px;"
                  onchange="app.updateCustomText('existenceAffirmation', this.value)"
                >${currentValue}</textarea>
              </div>
            `}
          </div>
        `;
      }

      return `
        <div class="container-wide fade-in">
          <div style="margin-bottom: 40px;">
            <button class="button button-small" onclick="app.showAdmin()">
              ← 一覧に戻る
            </button>
          </div>

          <div class="edit-container">
            <!-- 左サイドバー -->
            <div>
              <div class="edit-panel">
                <div class="edit-panel-title">問診内容</div>
                <div class="questionnaire-display">
                  <div class="questionnaire-field">
                    <div class="questionnaire-label">名前</div>
                    <div>${state.editingCarte.questionnaire.name}</div>
                  </div>
                  <div class="questionnaire-field">
                    <div class="questionnaire-label">最近の様子</div>
                    <div>${state.editingCarte.questionnaire.recentCondition}</div>
                  </div>
                  <div class="questionnaire-field">
                    <div class="questionnaire-label">気になる変化</div>
                    <div>${state.editingCarte.questionnaire.concerns}</div>
                  </div>
                  <div class="questionnaire-field">
                    <div class="questionnaire-label">疲れの種類</div>
                    <div>${state.editingCarte.questionnaire.fatigueType.join(', ')}</div>
                  </div>
                </div>
              </div>
            </div>

            <!-- メイン -->
            <div class="edit-main">
              <h3 style="font-size: 0.9rem; font-weight: 400; letter-spacing: 0.1em; margin-bottom: 40px; opacity: 0.7;">カルテ編集</h3>
              
              ${renderEditBlock(
                'stateAcceptance',
                '① 状態の受け止め',
                CARTE_PHRASES.STATE_ACCEPTANCE
              )}

              ${renderEditBlock(
                'usedPower',
                '② 使われ続けている力',
                CARTE_PHRASES.USED_POWER
              )}

              ${renderEditBlock(
                'missingPower',
                '③ 補われていない力',
                CARTE_PHRASES.MISSING_POWER
              )}

              ${renderExistenceBlock()}

              ${renderEditBlock(
                'supportDirection',
                '⑤ 寄り添いの方向',
                CARTE_PHRASES.SUPPORT_DIRECTION
              )}

              <div class="edit-actions">
                <button class="button" onclick="app.showAdmin()">
                  キャンセル
                </button>
                <button class="button button-primary" onclick="app.showConfirmation()">
                  確定前チェックへ
                </button>
              </div>
            </div>

            <!-- 右サイドバー -->
            <div>
              <div class="edit-panel" style="margin-bottom: 30px;">
                <div class="edit-panel-title">寄り添いモコ</div>
                <div>
                  ${Object.values(MOCO_TYPES).map(moco => `
                    <div 
                      class="moco-option ${state.editingCarte.selectedMoco.id === moco.id ? 'selected' : ''}"
                      onclick="app.selectEditMoco('${moco.id}')"
                    >
                      <div class="moco-ear" style="background-color: ${moco.earColor}"></div>
                      <div class="moco-option-name">${moco.name}</div>
                    </div>
                  `).join('')}
                </div>
              </div>

              <div class="edit-panel">
                <div class="edit-panel-title">処方（最大3つ）</div>
                <div class="prescription-checkboxes">
                  ${Object.values(PRESCRIPTIONS).map(prescription => {
                    const isSelected = state.editingCarte.selectedPrescriptions.some(p => p.id === prescription.id);
                    return `
                      <label class="prescription-checkbox-label">
                        <input 
                          type="checkbox"
                          class="prescription-checkbox"
                          data-prescription-id="${prescription.id}"
                          ${isSelected ? 'checked' : ''}
                          ${!isSelected && state.editingCarte.selectedPrescriptions.length >= 3 ? 'disabled' : ''}
                          onchange="app.toggleEditPrescription('${prescription.id}')"
                        />
                        ${prescription.name}
                      </label>
                    `;
                  }).join('')}
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderConfirmation() {
      if (!state.editingCarte) return '';
      
      const carteFullText = assembleCarteFullText(state.editingCarte.carteText);
      const textLength = carteFullText.length;
      
      // 自動チェック項目の判定
      const autoChecks = {
        hasAffirmation: carteFullText.includes('壊れていないモコ') || 
                        carteFullText.includes('光を放っているモコ') ||
                        carteFullText.includes('ほどけてはいないモコ') ||
                        carteFullText.includes('やわらかく結ばれたままモコ') ||
                        carteFullText.includes('ここまで来ているモコ') ||
                        carteFullText.includes('終わりに辿り着いているモコ') ||
                        carteFullText.includes('保たれているモコ') ||
                        carteFullText.includes('大丈夫な形でいるモコ') ||
                        carteFullText.includes('確かにいるモコ') ||
                        carteFullText.includes('静かな間の中に在るモコ') ||
                        carteFullText.includes('失われていないモコ') ||
                        carteFullText.includes('そばにちゃんといるモコ') ||
                        carteFullText.includes('無事でいるモコ') ||
                        carteFullText.includes('守られて今ここにいるモコ'),
        notTooLong: textLength <= 400
      };
      
      const allChecked = 
        state.confirmationChecks.notDiagnosis &&
        state.confirmationChecks.notInstruction &&
        (state.confirmationChecks.hasAffirmation || autoChecks.hasAffirmation) &&
        (state.confirmationChecks.notTooLong || autoChecks.notTooLong);

      return `
        <div class="confirmation-modal">
          <div class="confirmation-content fade-in">
            <h3 class="confirmation-title">確定前チェック</h3>
            
            <div class="confirmation-preview">
              <div class="confirmation-preview-title">カルテ全文プレビュー</div>
              <div class="confirmation-preview-text">${carteFullText}</div>
            </div>

            <div class="confirmation-checklist">
              <div class="confirmation-item ${state.confirmationChecks.notDiagnosis ? 'checked' : ''}">
                <input 
                  type="checkbox" 
                  class="confirmation-checkbox"
                  ${state.confirmationChecks.notDiagnosis ? 'checked' : ''}
                  onchange="app.toggleCheck('notDiagnosis')"
                />
                <div>
                  <div class="confirmation-label">診断になっていないモコ</div>
                  <div class="confirmation-detail">
                    「〜症です」「〜の状態です」など、医学的診断や判定を避けているか確認するモコ。
                  </div>
                </div>
              </div>

              <div class="confirmation-item ${state.confirmationChecks.notInstruction ? 'checked' : ''}">
                <input 
                  type="checkbox" 
                  class="confirmation-checkbox"
                  ${state.confirmationChecks.notInstruction ? 'checked' : ''}
                  onchange="app.toggleCheck('notInstruction')"
                />
                <div>
                  <div class="confirmation-label">指示になっていないモコ</div>
                  <div class="confirmation-detail">
                    「〜すべき」「〜してください」など、強い指示や命令を避けているか確認するモコ。
                  </div>
                </div>
              </div>

              <div class="confirmation-item ${autoChecks.hasAffirmation ? 'checked' : (state.confirmationChecks.hasAffirmation ? 'checked' : 'warning')}">
                <input 
                  type="checkbox" 
                  class="confirmation-checkbox"
                  ${autoChecks.hasAffirmation || state.confirmationChecks.hasAffirmation ? 'checked' : ''}
                  ${autoChecks.hasAffirmation ? 'disabled' : ''}
                  onchange="app.toggleCheck('hasAffirmation')"
                />
                <div>
                  <div class="confirmation-label">
                    「壊れていない」ことの明示があるモコ
                    ${autoChecks.hasAffirmation ? '（自動検出：✓）' : ''}
                  </div>
                  <div class="confirmation-detail">
                    ④ 存在の肯定ブロックに、壊れていない旨の文言が含まれているか確認するモコ。
                  </div>
                </div>
              </div>

              <div class="confirmation-item ${autoChecks.notTooLong ? 'checked' : (state.confirmationChecks.notTooLong ? 'checked' : 'warning')}">
                <input 
                  type="checkbox" 
                  class="confirmation-checkbox"
                  ${autoChecks.notTooLong || state.confirmationChecks.notTooLong ? 'checked' : ''}
                  ${autoChecks.notTooLong ? 'disabled' : ''}
                  onchange="app.toggleCheck('notTooLong')"
                />
                <div>
                  <div class="confirmation-label">
                    文章量が多すぎないモコ
                    ${autoChecks.notTooLong ? `（${textLength}文字：✓）` : `（${textLength}文字：要確認）`}
                  </div>
                  <div class="confirmation-detail">
                    カルテ全体が400文字以内を目安としているモコ。長すぎると負担になる可能性があるモコ。
                  </div>
                </div>
              </div>
            </div>

            ${!allChecked ? `
              <div class="confirmation-warning">
                すべての項目を確認してから確定するモコ
              </div>
            ` : ''}

            <div class="confirmation-actions">
              <button class="button" onclick="app.hideConfirmation()">
                編集に戻る
              </button>
              <button 
                class="button button-primary" 
                onclick="app.finalizeAndUpdate()"
                ${!allChecked ? 'disabled' : ''}
              >
                このまま確定
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function render() {
      const views = {
        welcome: renderWelcome,
        questionnaire: renderQuestionnaire,
        carte: renderCarte,
        salonInfo: renderSalonInfo,
        fullCarte: renderFullCarte,
        admin: renderAdmin,
        edit: renderEdit
      };
      
      let html = views[state.view]();
      
      // 確認モーダルを表示
      if (state.showConfirmation) {
        html += renderConfirmation();
      }
      
      document.getElementById('app').innerHTML = html;
    }

    // ========================================
    // アプリケーションロジック
    // ========================================
    const app = {
      showWelcome() {
        state.view = 'welcome';
        render();
      },

      showQuestionnaire() {
        state.view = 'questionnaire';
        render();
        this.attachQuestionnaireListeners();
      },

      attachQuestionnaireListeners() {
        document.getElementById('input-name').addEventListener('input', (e) => {
          state.questionnaire.name = e.target.value;
          render();
        });
        document.getElementById('input-age').addEventListener('input', (e) => {
          state.questionnaire.age = e.target.value;
        });
        document.getElementById('input-personality').addEventListener('input', (e) => {
          state.questionnaire.personality = e.target.value;
        });
        document.getElementById('input-recent').addEventListener('input', (e) => {
          state.questionnaire.recentCondition = e.target.value;
        });
        document.getElementById('input-concerns').addEventListener('input', (e) => {
          state.questionnaire.concerns = e.target.value;
        });
        document.getElementById('input-role').addEventListener('input', (e) => {
          state.questionnaire.role = e.target.value;
        });

        document.querySelectorAll('[data-fatigue-type]').forEach(checkbox => {
          checkbox.addEventListener('change', (e) => {
            const type = e.target.dataset.fatigueType;
            if (e.target.checked) {
              if (!state.questionnaire.fatigueType.includes(type)) {
                state.questionnaire.fatigueType.push(type);
              }
            } else {
              state.questionnaire.fatigueType = state.questionnaire.fatigueType.filter(t => t !== type);
            }
          });
        });
      },

      async submitQuestionnaire() {
        const moco = selectMoco(state.questionnaire);
        const prescriptions = selectPrescriptions(state.questionnaire);
        
        state.selectedMoco = moco;
        state.selectedPrescriptions = prescriptions;
        state.carteText = generateCarteText(state.questionnaire, moco);
        
        const carteData = {
          questionnaire: state.questionnaire,
          selectedMoco: moco,
          selectedPrescriptions: prescriptions,
          carteText: state.carteText,
          status: 'pending',
          createdAt: new Date().toISOString()
        };
        
        const result = await saveCarte(carteData);
        if (result.success) {
          state.currentCarteId = result.id;
        }
        
        state.view = 'carte';
        render();
      },

      showSalonInfo() {
        state.view = 'salonInfo';
        render();
      },

      backToCarte() {
        state.view = 'carte';
        render();
      },

      viewFullCarte() {
        state.view = 'fullCarte';
        render();
      },

      async showAdmin() {
        state.view = 'admin';
        state.carteList = await getAllCartes();
        render();
      },

      setFilter(filter) {
        state.filterStatus = filter;
        render();
      },

      async editCarte(id) {
        const carte = await getCarte(id);
        if (carte) {
          state.editingCarte = carte;
          // 編集モードを初期化（すべて選択モード）
          state.editMode = {
            stateAcceptance: 'select',
            usedPower: 'select',
            missingPower: 'select',
            existenceAffirmation: 'select',
            supportDirection: 'select'
          };
          state.view = 'edit';
          render();
        }
      },

      setEditMode(fieldKey, mode) {
        state.editMode[fieldKey] = mode;
        render();
      },

      selectPhrase(fieldKey, phraseIndex) {
        const phrases = CARTE_PHRASES[fieldKey.replace(/([A-Z])/g, '_$1').toUpperCase()];
        if (phrases && phrases[phraseIndex]) {
          state.editingCarte.carteText[fieldKey] = phrases[phraseIndex];
          render();
        }
      },

      selectExistencePhrase(mocoKey, phraseIndex) {
        const phrases = CARTE_PHRASES.EXISTENCE_AFFIRMATION[mocoKey];
        if (phrases && phrases[phraseIndex] !== undefined) {
          state.editingCarte.carteText.existenceAffirmation = phrases[phraseIndex];
          render();
        }
      },

      updateCustomText(fieldKey, value) {
        state.editingCarte.carteText[fieldKey] = value;
      },

      showConfirmation() {
        // 自由入力モードの場合は値を先に保存
        Object.keys(state.editMode).forEach(fieldKey => {
          if (state.editMode[fieldKey] === 'custom') {
            const element = document.getElementById(`edit-${fieldKey}`);
            if (element) {
              state.editingCarte.carteText[fieldKey] = element.value;
            }
          }
        });
        
        // チェック状態をリセット
        state.confirmationChecks = {
          notDiagnosis: false,
          notInstruction: false,
          hasAffirmation: false,
          notTooLong: false
        };
        
        state.showConfirmation = true;
        render();
      },

      hideConfirmation() {
        state.showConfirmation = false;
        render();
      },

      toggleCheck(checkKey) {
        state.confirmationChecks[checkKey] = !state.confirmationChecks[checkKey];
        render();
      },

      async finalizeAndUpdate() {
        if (!state.editingCarte) return;
        
        const result = await updateCarte(state.editingCarte.id, {
          ...state.editingCarte,
          status: 'confirmed'
        });
        
        if (result.success) {
          state.showConfirmation = false;
          alert('カルテを確定しました');
          this.showAdmin();
        }
      },

      selectEditMoco(mocoId) {
        const moco = Object.values(MOCO_TYPES).find(m => m.id === mocoId);
        if (moco) {
          state.editingCarte.selectedMoco = moco;
          render();
        }
      },

      toggleEditPrescription(prescriptionId) {
        const prescription = Object.values(PRESCRIPTIONS).find(p => p.id === prescriptionId);
        if (!prescription) return;

        const isSelected = state.editingCarte.selectedPrescriptions.some(p => p.id === prescriptionId);
        
        if (isSelected) {
          state.editingCarte.selectedPrescriptions = state.editingCarte.selectedPrescriptions.filter(p => p.id !== prescriptionId);
        } else {
          if (state.editingCarte.selectedPrescriptions.length < 3) {
            state.editingCarte.selectedPrescriptions.push(prescription);
          }
        }
        
        render();
      }
    };

    // グローバルスコープに公開
    window.app = app;

    // 初期レンダリング
    render();
  </script>
</body>
</html>
