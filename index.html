<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ぬいぐるみ心整所 モコ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Zen+Maru+Gothic:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Zen Maru Gothic', 'Noto Serif JP', serif;
      background: #FFFFFF;
      color: #999999;
      line-height: 2;
      font-weight: 300;
      min-height: 100vh;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 100px 40px;
    }

    .hidden {
      display: none !important;
    }

    /* ========================================
       トップページ
    ======================================== */
    .welcome {
      text-align: center;
      padding-top: 120px;
    }

    .welcome-title {
      font-size: 1.3rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      margin-bottom: 100px;
      color: #AAAAAA;
    }

    .welcome-title::before {
      content: '';
      display: block;
      width: 1px;
      height: 80px;
      background: linear-gradient(to bottom, transparent, rgba(170, 170, 170, 0.3), transparent);
      margin: 0 auto 80px;
    }

    /* きらめきモコのビジュアル */
    .kirameki-visual {
      width: 200px;
      height: 200px;
      margin: 0 auto 60px;
    }

    .kirameki-visual img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.05));
    }

    .welcome-catchphrase {
      font-size: 1.1rem;
      line-height: 2.5;
      margin-bottom: 40px;
      color: #AAAAAA;
      font-weight: 300;
    }

    .welcome-note {
      font-size: 0.7rem;
      color: #CCCCCC;
      margin-bottom: 100px;
      letter-spacing: 0.1em;
    }

    .welcome-description {
      margin: 80px auto 100px;
      max-width: 500px;
      padding: 50px 40px;
      border: 1px solid rgba(170, 170, 170, 0.15);
      background: rgba(255, 255, 255, 0.5);
    }

    .welcome-description-text {
      font-size: 0.95rem;
      line-height: 2.2;
      color: #AAAAAA;
      text-align: center;
    }

    .kirameki-intro {
      margin: 100px auto;
      max-width: 400px;
      text-align: center;
    }

    .kirameki-intro-text {
      font-size: 0.9rem;
      line-height: 2.2;
      color: #BBBBBB;
    }

    /* ボタン */
    .button {
      background: transparent;
      border: 1px solid rgba(170, 170, 170, 0.3);
      padding: 18px 50px;
      font-size: 0.9rem;
      font-family: 'Zen Maru Gothic', serif;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.4s ease;
      font-weight: 300;
      color: #999999;
      display: inline-block;
      text-decoration: none;
    }

    .button:hover {
      background: rgba(170, 170, 170, 0.03);
      border-color: rgba(170, 170, 170, 0.4);
    }

    .button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .button-primary {
      border-color: rgba(170, 170, 170, 0.4);
    }

    .button-small {
      padding: 12px 30px;
      font-size: 0.75rem;
    }

    .button-secondary {
      border-color: rgba(170, 170, 170, 0.2);
      color: #BBBBBB;
      font-size: 0.85rem;
    }

    .nav-buttons {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      margin-top: 80px;
    }

    /* ========================================
       問診フォーム
    ======================================== */
    .title {
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      margin-bottom: 20px;
      text-align: center;
      color: #AAAAAA;
    }

    .text {
      font-size: 0.9rem;
      color: #BBBBBB;
    }

    .text-center {
      text-align: center;
    }

    .form-group {
      margin-bottom: 50px;
    }

    .label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 12px;
      color: #AAAAAA;
      letter-spacing: 0.1em;
    }

    .input, .textarea {
      width: 100%;
      padding: 16px 20px;
      font-size: 0.9rem;
      font-family: 'Zen Maru Gothic', serif;
      border: 1px solid rgba(170, 170, 170, 0.2);
      background: #FFFFFF;
      color: #888888;
      transition: all 0.3s ease;
      font-weight: 300;
    }

    .input:focus, .textarea:focus {
      outline: none;
      border-color: rgba(170, 170, 170, 0.4);
    }

    .textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.8;
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      cursor: pointer;
      color: #AAAAAA;
      transition: color 0.3s ease;
    }

    .checkbox-label:hover {
      color: #888888;
    }

    .checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* 利用規約同意 */
    .terms-agreement {
      margin-top: 60px;
      padding: 30px;
      border: 1px solid rgba(170, 170, 170, 0.15);
      background: rgba(255, 255, 255, 0.5);
      border-radius: 2px;
    }

    .terms-agreement label {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
    }

    .terms-link {
      background: none;
      border: none;
      text-decoration: underline;
      color: #999999;
      cursor: pointer;
      font-size: inherit;
      font-family: inherit;
      padding: 0;
      transition: color 0.3s ease;
    }

    .terms-link:hover {
      color: #777777;
    }

    .action-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 80px;
      flex-wrap: wrap;
    }

    /* ========================================
       カルテ表示
    ======================================== */
    .carte-header {
      text-align: center;
      margin-bottom: 80px;
      padding-bottom: 40px;
      border-bottom: 1px solid rgba(170, 170, 170, 0.1);
    }

    .carte-nui-name {
      font-size: 1.3rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      margin-bottom: 20px;
      color: #AAAAAA;
    }

    .carte-moco {
      font-size: 0.75rem;
      color: #CCCCCC;
      letter-spacing: 0.15em;
    }

    .carte-body {
      font-size: 1rem;
      line-height: 2.5;
      color: #999999;
      white-space: pre-line;
      margin-bottom: 60px;
      text-align: center;
    }

    .carte-note {
      font-size: 0.7rem;
      line-height: 2;
      color: #CCCCCC;
      font-style: italic;
      text-align: center;
      margin: 60px auto;
    }

    .carte-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(170, 170, 170, 0.15), transparent);
      margin: 80px 0;
    }

    .carte-transition {
      text-align: center;
      margin: 80px auto;
    }

    .carte-transition-text {
      font-size: 0.95rem;
      line-height: 2.2;
      color: #AAAAAA;
      margin-bottom: 50px;
    }

    /* 寄り添いモコの表示（色を使用） */
    .yorisoi-section {
      margin: 80px auto;
      max-width: 600px;
    }

    .yorisoi-card {
      padding: 40px;
      border: 1px solid rgba(170, 170, 170, 0.2);
      margin-bottom: 30px;
      text-align: center;
    }

    .yorisoi-name {
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .yorisoi-ear {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: inline-block;
    }

    .yorisoi-phrase {
      font-size: 1.1rem;
      line-height: 2.2;
      color: #888888;
      margin-bottom: 20px;
    }

    .yorisoi-description {
      font-size: 0.8rem;
      line-height: 1.8;
      color: #BBBBBB;
    }

    /* 処方カード */
    .prescription-card {
      margin: 60px auto;
      max-width: 350px;
      aspect-ratio: 1.6;
      border: 1px solid rgba(170, 170, 170, 0.2);
      background: #FFFFFF;
      padding: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .prescription-card-phrase {
      font-size: 0.95rem;
      line-height: 2.2;
      color: #999999;
    }

    /* ========================================
       サロン案内ページ
    ======================================== */
    .salon-info-title {
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      margin-bottom: 30px;
      text-align: center;
      color: #AAAAAA;
    }

    .salon-info-description {
      font-size: 0.95rem;
      line-height: 2.5;
      color: #BBBBBB;
      text-align: center;
      margin-bottom: 80px;
    }

    .salon-box {
      padding: 60px 40px;
      border: 1px solid rgba(170, 170, 170, 0.15);
      margin-bottom: 60px;
      background: rgba(255, 255, 255, 0.5);
    }

    .salon-box-title {
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      margin-bottom: 30px;
      color: #AAAAAA;
      text-align: center;
    }

    .salon-items {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 40px;
    }

    .salon-item {
      padding: 20px;
      border-left: 2px solid rgba(170, 170, 170, 0.2);
      background: rgba(255, 255, 255, 0.3);
      font-size: 0.85rem;
      color: #AAAAAA;
    }

    .salon-price {
      text-align: center;
      margin-bottom: 40px;
    }

    .salon-price-amount {
      font-size: 1.3rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      margin-bottom: 15px;
      color: #999999;
    }

    .salon-price-note {
      font-size: 0.75rem;
      color: #CCCCCC;
    }

    .salon-note {
      font-size: 0.75rem;
      line-height: 2;
      color: #CCCCCC;
      text-align: center;
      margin-bottom: 40px;
    }

    /* 寄り添いモコオプション */
    .yorisoi-option-section {
      margin: 100px auto 60px;
      max-width: 600px;
    }

    .yorisoi-option-title {
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      margin-bottom: 30px;
      color: #AAAAAA;
      text-align: center;
    }

    .yorisoi-option-description {
      font-size: 0.85rem;
      line-height: 2.2;
      color: #BBBBBB;
      text-align: center;
      margin-bottom: 40px;
    }

    .yorisoi-option-box {
      padding: 40px;
      border: 1px solid rgba(170, 170, 170, 0.15);
      margin-bottom: 30px;
    }

    .yorisoi-options-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
    }

    .yorisoi-option-item {
      padding: 20px;
      border: 1px solid rgba(170, 170, 170, 0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #FFFFFF;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .yorisoi-option-item:hover {
      border-color: rgba(170, 170, 170, 0.3);
      background: rgba(255, 255, 255, 0.8);
    }

    .yorisoi-option-name {
      font-size: 0.85rem;
      color: #AAAAAA;
    }

    .yorisoi-option-price {
      font-size: 0.9rem;
      color: #999999;
    }

    /* ========================================
       決済ページ
    ======================================== */
    .payment-summary {
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(170, 170, 170, 0.15);
      padding: 40px;
      margin-bottom: 60px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .payment-summary-row {
      display: flex;
      justify-content: space-between;
      padding: 15px 0;
      border-bottom: 1px solid rgba(170, 170, 170, 0.1);
      font-size: 0.9rem;
      color: #999999;
    }

    .payment-summary-row:last-child {
      border-bottom: none;
      font-size: 1.1rem;
      padding-top: 25px;
      margin-top: 15px;
      border-top: 1px solid rgba(170, 170, 170, 0.2);
      color: #888888;
    }

    .payment-info-box {
      padding: 30px;
      border: 1px solid rgba(170, 170, 170, 0.1);
      background: rgba(255, 255, 255, 0.3);
      margin-bottom: 30px;
      text-align: center;
    }

    .payment-info-text {
      font-size: 0.85rem;
      line-height: 2;
      color: #AAAAAA;
      margin-bottom: 30px;
    }

    .payment-features {
      text-align: center;
      margin-bottom: 30px;
    }

    .payment-features-text {
      font-size: 0.7rem;
      line-height: 2;
      color: #CCCCCC;
    }

    /* ========================================
       法的ページ（利用規約等）
    ======================================== */
    .legal-section {
      margin-bottom: 60px;
      padding-bottom: 40px;
      border-bottom: 1px solid rgba(170, 170, 170, 0.08);
    }

    .legal-section:last-of-type {
      border-bottom: none;
    }

    .legal-label {
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
      color: #999999;
    }

    .legal-content {
      font-size: 0.8rem;
      line-height: 2.2;
      color: #AAAAAA;
    }

    .legal-content strong {
      font-weight: 400;
      color: #999999;
    }

    /* ========================================
       アニメーション
    ======================================== */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeIn 1s ease-out;
    }

    /* ========================================
       フッターリンク
    ======================================== */
    .footer-links {
      text-align: center;
      margin-top: 100px;
      padding-top: 50px;
      border-top: 1px solid rgba(170, 170, 170, 0.08);
    }

    .footer-links-container {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ========================================
       管理画面
    ======================================== */
    .admin-login {
      max-width: 400px;
      margin: 0 auto;
      text-align: center;
    }

    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 40px;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 60px;
      padding-bottom: 30px;
      border-bottom: 1px solid rgba(170, 170, 170, 0.1);
    }

    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 60px;
    }

    .stat-card {
      padding: 30px;
      border: 1px solid rgba(170, 170, 170, 0.15);
      background: rgba(255, 255, 255, 0.5);
      text-align: center;
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 400;
      color: #888888;
      margin-bottom: 10px;
    }

    .stat-label {
      font-size: 0.8rem;
      color: #BBBBBB;
      letter-spacing: 0.1em;
    }

    .carte-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .carte-list-item {
      padding: 25px;
      border: 1px solid rgba(170, 170, 170, 0.15);
      background: #FFFFFF;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .carte-list-item:hover {
      border-color: rgba(170, 170, 170, 0.3);
      background: rgba(255, 255, 255, 0.8);
    }

    .carte-info {
      flex: 1;
    }

    .carte-name {
      font-size: 1rem;
      color: #888888;
      margin-bottom: 8px;
    }

    .carte-date {
      font-size: 0.75rem;
      color: #CCCCCC;
    }

    .carte-actions {
      display: flex;
      gap: 10px;
    }

    .carte-detail {
      padding: 40px;
      border: 1px solid rgba(170, 170, 170, 0.15);
      background: rgba(255, 255, 255, 0.5);
      margin-bottom: 30px;
    }

    .carte-detail-section {
      margin-bottom: 30px;
      padding-bottom: 30px;
      border-bottom: 1px solid rgba(170, 170, 170, 0.08);
    }

    .carte-detail-section:last-child {
      border-bottom: none;
    }

    .carte-detail-label {
      font-size: 0.8rem;
      color: #BBBBBB;
      margin-bottom: 10px;
      letter-spacing: 0.1em;
    }

    .carte-detail-content {
      font-size: 0.9rem;
      color: #888888;
      line-height: 2;
    }

    .admin-tabs {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
      border-bottom: 1px solid rgba(170, 170, 170, 0.1);
    }

    .admin-tab {
      padding: 15px 30px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      font-size: 0.85rem;
      color: #BBBBBB;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Zen Maru Gothic', serif;
    }

    .admin-tab.active {
      color: #888888;
      border-bottom-color: #AAAAAA;
    }

    .admin-tab:hover {
      color: #999999;
    }

    .settings-section {
      margin-bottom: 60px;
      padding: 40px;
      border: 1px solid rgba(170, 170, 170, 0.15);
      background: rgba(255, 255, 255, 0.5);
    }

    .settings-title {
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      margin-bottom: 30px;
      color: #888888;
      text-align: center;
    }

    .settings-item {
      display: flex;
      gap: 20px;
      align-items: center;
      padding: 20px;
      border: 1px solid rgba(170, 170, 170, 0.1);
      margin-bottom: 15px;
      background: #FFFFFF;
    }

    .settings-item-label {
      flex: 1;
      font-size: 0.85rem;
      color: #AAAAAA;
    }

    .settings-item-input {
      width: 200px;
      padding: 12px 16px;
      font-size: 0.85rem;
      font-family: 'Zen Maru Gothic', serif;
      border: 1px solid rgba(170, 170, 170, 0.2);
      background: #FFFFFF;
      color: #888888;
    }

    .settings-item-input:focus {
      outline: none;
      border-color: rgba(170, 170, 170, 0.4);
    }

    .settings-item-textarea {
      flex: 1;
      padding: 12px 16px;
      font-size: 0.85rem;
      font-family: 'Zen Maru Gothic', serif;
      border: 1px solid rgba(170, 170, 170, 0.2);
      background: #FFFFFF;
      color: #888888;
      min-height: 60px;
      resize: vertical;
    }

    .settings-item-textarea:focus {
      outline: none;
      border-color: rgba(170, 170, 170, 0.4);
    }

    /* ========================================
       レスポンシブ
    ======================================== */
    @media (max-width: 768px) {
      .container {
        padding: 60px 20px;
      }

      .welcome {
        padding-top: 80px;
      }

      .welcome-title {
        font-size: 1.1rem;
        margin-bottom: 60px;
      }

      .kirameki-visual {
        width: 160px;
        height: 160px;
      }

      .button {
        padding: 16px 40px;
        font-size: 0.85rem;
      }

      .action-buttons {
        flex-direction: column;
      }

      .admin-container {
        padding: 40px 20px;
      }

      .admin-stats {
        grid-template-columns: 1fr;
      }

      .carte-list-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }

      .carte-actions {
        width: 100%;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    // ========================================
    // データ定義
    // ========================================
    
    // 寄り添いモコの定義（耳の色で識別）
    const YORISOI_MOCO_TYPES = {
      SUKIMA: {
        id: 'sukima',
        name: 'すきまモコ',
        earColor: '#C8E6C9', // 若葉色
        phrase: '静かに。',
        description: '考えすぎて休まらない時に',
        keywords: ['考え', '思考', '頭', '休まらない', 'ぐるぐる']
      },
      HOKORORBI: {
        id: 'hokororbi',
        name: 'ほころびモコ',
        earColor: '#F5F5DC', // 生成り
        phrase: '少し、ゆるんでもいいだね〜',
        description: '緊張や感情疲労がある時に',
        keywords: ['緊張', '張', '硬', 'ゆるめ', '力', '気遣']
      },
      OWARI: {
        id: 'owari',
        name: 'おわりモコ',
        earColor: '#E0E0E0', // 薄灰
        phrase: 'ここまででいいのだモコ',
        description: '区切りがつかない時に',
        keywords: ['終わ', '区切', '続け', '背負', 'やめられない']
      },
      DAIJOUBU: {
        id: 'daijoubu',

    function selectYorisoiMoco(questionnaire) {
      const allText = `${questionnaire.recentCondition} ${questionnaire.concerns} ${questionnaire.fatigueType.join(' ')}`.toLowerCase();
      
      const scores = Object.values(YORISOI_MOCO_TYPES).map(moco => {
        let score = 0;
        moco.keywords.forEach(keyword => {
          if (allText.includes(keyword)) score += 1;
        });
        return { moco, score };
      });
      
      scores.sort((a, b) => b.score - a.score);
      return scores[0].score > 0 ? scores[0].moco : YORISOI_MOCO_TYPES.SUKIMA;
    }
// ひとやすみアイテムの自動選出
function selectHitoyasumiItems(questionnaire) {
  const allText = `${questionnaire.recentCondition} ${questionnaire.concerns} ${questionnaire.fatigueType.join(' ')} ${questionnaire.personality}`.toLowerCase();
  
  const itemScores = state.settings.hitoyasumiItems.map(item => {
    let score = 0;
    
    // キーワードマッチング
    const keywords = {
      'pound_cake': ['疲れ', '身体', '重', '眠', '休息'],
      'madeleine': ['緊張', '硬', '力', '張'],
      'kohaku': ['考え', '頭', 'ぐるぐる', '思考'],
      'dry_tea': ['間', '余白', '時間', 'ゆっくり'],
      'dry_soup': ['温', '冷', '安心', '落ち着']
    };
    
    if (keywords[item.id]) {
      keywords[item.id].forEach(keyword => {
        if (allText.includes(keyword)) score += 1;
      });
    }
    
    return { item, score };
  });
  
  // スコア順にソート
  itemScores.sort((a, b) => b.score - a.score);
  
  // 上位3つを選出（最低でも1つ）
  const selectedCount = Math.max(1, Math.min(3, itemScores.filter(i => i.score > 0).length));
  return itemScores.slice(0, selectedCount).map(s => s.item);
}

      try {
        const id = carteData.id || `nui_${Date.now()}`;

    // 統計計算
    function calculateStats(cartes) {
      const now = new Date();
      
      // 無料・課金の分類
      const freeCartes = cartes.filter(c => !c.isPaid || c.paymentStatus === 'free');
      const paidCartes = cartes.filter(c => c.isPaid || c.paymentStatus === 'paid' || c.paymentStatus === 'completed');
      const completedCartes = cartes.filter(c => c.paymentStatus === 'completed');
      
      const thisMonth = cartes.filter(c => {
        const carteDate = new Date(c.createdAt);
        return carteDate.getMonth() === now.getMonth() && 
               carteDate.getFullYear() === now.getFullYear();
      }).length;

      const thisWeek = cartes.filter(c => {
        const carteDate = new Date(c.createdAt);
        const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
        return carteDate >= weekAgo;
      }).length;

      const mocoCount = {};
      cartes.forEach(c => {
        const mocoName = c.selectedYorisoiMoco?.name || '未選定';
        mocoCount[mocoName] = (mocoCount[mocoName] || 0) + 1;
      });

      const mostCommonMoco = Object.entries(mocoCount).sort((a, b) => b[1] - a[1])[0]?.[0] || '-';

      return {
        totalCartes: cartes.length,
        freeOnly: freeCartes.length,
        paid: paidCartes.length,
        completed: completedCartes.length,
        conversionRate: cartes.length > 0 ? Math.round((paidCartes.length / cartes.length) * 100) : 0,
        thisMonth,
        thisWeek,
        mostCommonMoco
      };
    }

    // カルテ取得関数（全件）
    async function getAllCartes() {
      try {
        // Google Sheetsから取得を試みる
        try {
          const response = await fetch(GOOGLE_SHEETS_API + '?action=getAll', {
            method: 'GET',
            mode: 'cors'
          });
          
          const data = await response.json();
          
          if (data.success && data.cartes) {
            console.log('Google Sheetsからカルテを取得:', data.cartes.length + '件');
            return data.cartes.sort((a, b) => 
              new Date(b.createdAt) - new Date(a.createdAt)
            );
          }
        } catch (sheetsError) {
          console.log('Google Sheets取得エラー。localStorageから読み込みます:', sheetsError.message);
        }
        
        // フォールバック: localStorage
        const keys = Object.keys(localStorage).filter(k => k.startsWith(STORAGE_PREFIX + 'carte_'));
        const cartes = keys.map(key => {
          try {
            return JSON.parse(localStorage.getItem(key));
          } catch (e) {
            return null;
          }
        }).filter(c => c !== null);
        
        return cartes.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        
      } catch (error) {
        console.log('カルテ取得エラー:', error.message);
        return [];
      }
    }

    // カルテ取得関数（単体）
    async function getCarte(carteId) {
      try {
        // まずlocalStorageから取得（高速）
        const key = `${STORAGE_PREFIX}carte_${carteId}`;
        const localData = localStorage.getItem(key);
        if (localData) {
          return JSON.parse(localData);
        }
        
        // localStorageになければGoogle Sheetsから取得
        try {
          const response = await fetch(GOOGLE_SHEETS_API + '?action=get&carteId=' + carteId, {
            method: 'GET',
            mode: 'cors'
          });
          
          const data = await response.json();
          
          if (data.success && data.carte) {
            // localStorageにもキャッシュ
            localStorage.setItem(key, JSON.stringify(data.carte));
            return data.carte;
          }
        } catch (sheetsError) {
          console.log('Google Sheets取得エラー:', sheetsError.message);
        }
        
        return null;
      } catch (error) {
        console.log('カルテ取得エラー:', error.message);
        return null;
      }
    }

    // カルテ削除関数
    async function deleteCarteById(carteId) {
      try {
        // Google Sheetsから削除
        try {
          await fetch(GOOGLE_SHEETS_API, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              action: 'delete',
              carteId: carteId
            })
          });
          
          console.log('Google Sheetsからカルテを削除しました:', carteId);
        } catch (sheetsError) {
          console.log('Google Sheets削除エラー:', sheetsError.message);
        }
        
        // localStorageからも削除
        const key = `${STORAGE_PREFIX}carte_${carteId}`;
        localStorage.removeItem(key);
        
        return { success: true };
      } catch (error) {
        console.error('カルテ削除エラー:', error);
        return { success: false };
      }
    }

          this.updateSubmitButton();
        });
        document.getElementById('input-age').addEventListener('input', (e) => {
          state.questionnaire.age = e.target.value;
        });
        document.getElementById('input-personality').addEventListener('input', (e) => {
          state.questionnaire.personality = e.target.value;
        });
        document.getElementById('input-recent').addEventListener('input', (e) => {
          state.questionnaire.recentCondition = e.target.value;
        });
        document.getElementById('input-concerns').addEventListener('input', (e) => {
          state.questionnaire.concerns = e.target.value;
        });
        document.getElementById('input-role').addEventListener('input', (e) => {
          state.questionnaire.role = e.target.value;
        });

        document.querySelectorAll('[data-fatigue-type]').forEach(checkbox => {
          checkbox.addEventListener('change', (e) => {
            const type = e.target.dataset.fatigueType;
            if (e.target.checked) {
              if (!state.questionnaire.fatigueType.includes(type)) {
                state.questionnaire.fatigueType.push(type);
              }
            } else {
              state.questionnaire.fatigueType = state.questionnaire.fatigueType.filter(t => t !== type);
            }
          });
        });

        const termsCheckbox = document.getElementById('terms-checkbox');
        if (termsCheckbox) {
          termsCheckbox.addEventListener('change', (e) => {
            state.agreedToTerms = e.target.checked;
            this.updateSubmitButton();
          });
        }
      },

      updateSubmitButton() {
        const submitButton = document.querySelector('.button.button-primary[onclick="app.submitQuestionnaire()"]');
        if (submitButton) {
          const canSubmit = state.questionnaire.name && state.agreedToTerms;
          submitButton.disabled = !canSubmit;
        }
      },

      async submitQuestionnaire() {
        if (!state.agreedToTerms) {
          alert('利用規約とプライバシーポリシーに同意してください。');
          return;
        }

        try {
          const yorisoiMoco = selectYorisoiMoco(state.questionnaire);
          const hitoyasumiItems = selectHitoyasumiItems(state.questionnaire);
          state.selectedYorisoiMoco = yorisoiMoco;
          state.carteText = generateCarteText(state.questionnaire);
          
          const carteData = {
            questionnaire: state.questionnaire,
            selectedYorisoiMoco: yorisoiMoco,
            hitoyasumiItems: hitoyasumiItems,
            carteText: state.carteText,
            createdAt: new Date().toISOString(),
            isPaid: false, // 初期は無料問診のみ
            paymentStatus: 'free' // 'free' | 'paid' | 'completed'
          };
          
          console.log('カルテを保存中...', carteData);
          const result = await saveCarte(carteData);
          
          if (result.success) {
            state.currentCarteId = result.id;
            console.log('カルテ保存成功:', result.id);
            
            // メール送信
            await sendEmailNotification(carteData, result.id);
          } else {
            console.error('カルテ保存失敗:', result.error);
            alert('カルテの保存に失敗しました。もう一度お試しください。');
            return;
          }
          
          state.view = 'carteIntro';
          render();
        } catch (error) {
          console.error('問診送信エラー:', error);
          alert('エラーが発生しました: ' + error.message);
        }
      },

      showSalonInfo() {
        state.view = 'salonInfo';
        render();
      },

      backToCarte() {
        state.view = 'carteIntro';
        render();
      },

      showHitoyasumi() {
        state.view = 'hitoyasumi';
        render();
      },

      showYorisoiOptions() {
        state.view = 'fullCarte';
        render();
      },

      showPayment() {
        state.view = 'payment';
        render();
      },

      selectYorisoiOption(period, price, label) {
        state.selectedYorisoiOption = { period, price, label };
        state.view = 'payment';
        render();
      },

      proceedToSquareCheckout() {
        // Square Payment Links（複数リンク方式）
        const PAYMENT_LINKS = {
          base: 'https://square.link/u/4qdjvN3G',        // 基本プラン ¥5,500
          with7day: 'https://square.link/u/yr1Bj3LF',    // 7日間 ¥7,000
          with1month: 'https://square.link/u/sCjRdBZX',  // 1ヶ月 ¥8,000
          withForever: 'https://square.link/u/24Dzk7Fh'  // 永遠 ¥7,500
        };
        
        // ユーザーの選択に応じて適切なリンクを選択
        let checkoutUrl;
        
        if (!state.selectedYorisoiOption) {
          // 寄り添いモコを選択していない場合は基本プラン
          checkoutUrl = PAYMENT_LINKS.base;
        } else {
          // 選択された寄り添いモコのプランに応じて振り分け
          switch(state.selectedYorisoiOption.period) {
            case '7day':
              checkoutUrl = PAYMENT_LINKS.with7day;
              break;
            case '1month':
              checkoutUrl = PAYMENT_LINKS.with1month;
              break;
            case 'forever':
              checkoutUrl = PAYMENT_LINKS.withForever;
              break;
            default:
              checkoutUrl = PAYMENT_LINKS.base;
          }
        }
        
        // カルテIDを保存（決済完了後の確認用）
        if (state.currentCarteId) {
          sessionStorage.setItem('pending_carte_id', state.currentCarteId);
          sessionStorage.setItem('payment_initiated', 'true');
        }
        
        console.log('決済ページへ遷移:', checkoutUrl);
        
        // Square決済ページに遷移
        window.location.href = checkoutUrl;
      },

      async checkPaymentSuccess() {
        const urlParams = new URLSearchParams(window.location.search);
        const paymentInitiated = sessionStorage.getItem('payment_initiated');
        
        if (urlParams.get('payment') === 'success' && paymentInitiated) {
          sessionStorage.removeItem('payment_initiated');
          const carteId = sessionStorage.getItem('pending_carte_id');
          
          if (carteId) {
            state.currentCarteId = carteId;
            sessionStorage.removeItem('pending_carte_id');
            
            // カルテの課金状況を更新
            try {
              const carte = await getCarte(carteId);
              if (carte) {
                carte.isPaid = true;
                carte.paymentStatus = 'paid';
                carte.paidAt = new Date().toISOString();
                await saveCarte(carte);
                console.log('決済情報をカルテに記録しました');
              }
            } catch (error) {
              console.log('決済情報の記録エラー:', error.message);
            }
          }
          
          // 決済完了後はお客様情報入力ページへ
          state.view = 'customerInfo';
          render();
          
          window.history.replaceState({}, document.title, window.location.pathname);
        }
      },

      showCustomerInfo() {
        state.view = 'customerInfo';
        render();
        this.attachCustomerInfoListeners();
      },

      attachCustomerInfoListeners() {
        document.getElementById('customer-name').addEventListener('input', (e) => {
          state.customerInfo.name = e.target.value;
        });
        document.getElementById('customer-email').addEventListener('input', (e) => {
          state.customerInfo.email = e.target.value;
        });
        document.getElementById('customer-phone').addEventListener('input', (e) => {
          state.customerInfo.phone = e.target.value;
        });
        document.getElementById('customer-postal').addEventListener('input', (e) => {
          state.customerInfo.postalCode = e.target.value;
        });
        document.getElementById('customer-address').addEventListener('input', (e) => {
          state.customerInfo.address = e.target.value;
        });
        document.getElementById('customer-notes').addEventListener('input', (e) => {
          state.customerInfo.notes = e.target.value;
        });
      },

      async submitCustomerInfo() {
        // バリデーション
        if (!state.customerInfo.name) {
          alert('お名前を入力してください');
          return;
        }
        if (!state.customerInfo.email) {
          alert('メールアドレスを入力してください');
          return;
        }
        if (!state.customerInfo.phone) {
          alert('電話番号を入力してください');
          return;
        }
        if (!state.customerInfo.postalCode) {
          alert('郵便番号を入力してください');
          return;
        }
        if (!state.customerInfo.address) {
          alert('ご住所を入力してください');
          return;
        }

        // お客様情報をカルテに紐づけて保存
        try {
          if (state.currentCarteId) {
            const carte = await getCarte(state.currentCarteId);
            if (carte) {
              carte.customerInfo = state.customerInfo;
              carte.customerInfoSubmittedAt = new Date().toISOString();
              carte.paymentStatus = 'completed'; // 全ステップ完了
              await saveCarte(carte);
            }
          }

          // 完了画面へ
          state.view = 'fullCarte';
          render();
        } catch (error) {
          console.log('お客様情報保存エラー:', error.message);
          alert('情報の保存に失敗しました。もう一度お試しください。');
        }
      },

      showTerms() {
        state.view = 'terms';
        render();
      },

      showLegal() {
        state.view = 'legal';
        render();
      },

      showPrivacy() {
        state.view = 'privacy';
        render();
      },

      // ========================================
      // 管理画面メソッド
      // ========================================
      
      showAdminLogin() {
        state.view = 'adminLogin';
        render();
      },

      async attemptAdminLogin() {
        const password = document.getElementById('admin-password').value;
        // 簡易パスワード認証（本番環境ではより安全な方法を使用してください）
        const ADMIN_PASSWORD = 'moco2026'; // ★ここを変更してください
        
        if (password === ADMIN_PASSWORD) {
          state.isAdminAuthenticated = true;
          await this.showAdmin();
        } else {
          alert('パスワードが正しくありません');
        }
      },

      async showAdmin() {
        if (!state.isAdminAuthenticated) {
          this.showAdminLogin();
          return;
        }

        state.view = 'admin';
        console.log('カルテ一覧を取得中...');
        state.carteList = await getAllCartes();
        console.log('取得したカルテ数:', state.carteList.length);
        console.log('カルテ一覧:', state.carteList);
        render();
      },

      async viewCarteDetail(carteId) {
        const carte = await getCarte(carteId);
        if (carte) {
          state.selectedCarteForView = carte;
          state.view = 'adminCarteDetail';
          render();
        }
      },

      async showEditCarte(carteId) {
        const carte = await getCarte(carteId);
        if (carte) {
          state.selectedCarteForEdit = carte;
          state.view = 'adminEditCarte';
          render();
          this.attachEditCarteListeners();
        }
      },

      attachEditCarteListeners() {
        const fields = ['name', 'age', 'personality', 'recentCondition', 'concerns', 'role'];
        fields.forEach(field => {
          const element = document.getElementById(`edit-${field}`);
          if (element) {
            element.addEventListener('input', (e) => {
              state.selectedCarteForEdit.questionnaire[field] = e.target.value;
            });
          }
        });
      },

      async saveEditedCarte() {
        if (!state.selectedCarteForEdit) return;
        
        const result = await saveCarte(state.selectedCarteForEdit);
        if (result.success) {
          alert('カルテを更新しました');
          this.showAdmin();
        } else {
          alert('更新に失敗しました');
        }
      },

      async deleteCarte(carteId) {
        if (!confirm('このカルテを削除してもよろしいですか？')) return;
        
        const result = await deleteCarteById(carteId);
        if (result.success) {
          alert('カルテを削除しました');
          this.showAdmin();
        } else {
          alert('削除に失敗しました');
        }
      },

      logoutAdmin() {
        state.isAdminAuthenticated = false;
        state.view = 'welcome';
        render();
      },

      switchAdminTab(tab) {
        state.adminCurrentTab = tab;
        render();
      },

      updateYorisoiOptionPrice(index, price) {
        state.settings.yorisoiOptions[index].price = parseInt(price) || 0;
      },

      updateHitoyasumiItemName(index, name) {
        state.settings.hitoyasumiItems[index].name = name;
      },

      updateHitoyasumiItemDescription(index, description) {
        state.settings.hitoyasumiItems[index].description = description;
      },

      async saveSettings() {
        try {
          // 設定をストレージに保存
          const settingsKey = STORAGE_PREFIX + 'settings';
          if (window.storage) {
            try {
              await window.storage.set(settingsKey, JSON.stringify(state.settings), false);
              alert('設定を保存しました');
            } catch (storageError) {
              // ストレージ失敗時はsessionStorageにフォールバック
              sessionStorage.setItem(settingsKey, JSON.stringify(state.settings));
              alert('設定を保存しました（ローカル保存）');
            }
          } else {
            sessionStorage.setItem(settingsKey, JSON.stringify(state.settings));
            alert('設定を保存しました');
          }
        } catch (error) {
          console.log('設定保存エラー:', error.message);
          alert('設定の保存に失敗しました: ' + error.message);
        }
      },

      async loadSettings() {
        try {
          const settingsKey = STORAGE_PREFIX + 'settings';
          if (window.storage) {
            try {
              const result = await window.storage.get(settingsKey, false);
              if (result && result.value) {
                state.settings = JSON.parse(result.value);
              }
            } catch (storageError) {
              // ストレージが存在しない場合はデフォルト設定を使用
              console.log('設定が見つかりません。デフォルト設定を使用します。');
            }
          } else {
            const data = sessionStorage.getItem(settingsKey);
            if (data) {
              state.settings = JSON.parse(data);
            }
          }
        } catch (error) {
          // エラーが出てもデフォルト設定で続行
          console.log('設定読み込みをスキップ:', error.message);
        }
      }
    };

    // ========================================
    // レンダリング
    // ========================================
    function render() {
      const views = {
        welcome: renderWelcome,
        questionnaireStart: renderQuestionnaireStart,
        questionnaire: renderQuestionnaire,
        carteIntro: renderCarteIntro,
        salonInfo: renderSalonInfo,
        hitoyasumi: renderHitoyasumi,
        yorisoiOptions: renderYorisoiOptions,
        payment: renderPayment,
        customerInfo: renderCustomerInfo,
        fullCarte: renderFullCarte,
        terms: renderTerms,
        legal: renderLegal,
        privacy: renderPrivacy,
        adminLogin: renderAdminLogin,
        admin: renderAdmin,
        adminCarteDetail: renderAdminCarteDetail,
        adminEditCarte: renderAdminEditCarte
      };
      
      let html = views[state.view]();
      document.getElementById('app').innerHTML = html;
      
      // ページ遷移時にスクロール位置を上部にリセット
      window.scrollTo(0, 0);

      // 特定のビューでリスナーをアタッチ
      if (state.view === 'customerInfo') {
        app.attachCustomerInfoListeners();
      }
    }

    // グローバルスコープに公開
    window.app = app;

    // 初期化処理
    (async function init() {
      // 設定を読み込み
      await app.loadSettings();
      
      // 決済完了後の処理をチェック
      app.checkPaymentSuccess();
      
      // 初期レンダリング
      if (state.view === 'welcome') {
        render();
      }
    })();
  </script>
</body>
</html>
